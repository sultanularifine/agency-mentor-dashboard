    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap"
        rel="stylesheet">

    <style>
        * {
            cursor: none;
        }

        body {
            transition: background-color 0.5s ease;
            overflow-x: hidden;
            scroll-behavior: auto;
        }

        .text-primary {
            color: #ff4d4d !important;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            width: 100%;
            height: 100vh;
            pointer-events: none;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .dark .glass {
            background: rgba(15, 23, 42, 0.2);
        }

        /* Cursor */
        #cursor-dot {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #ff4d4d;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10001;
            transform: translate(-50%, -50%);
        }

        #cursor-outline {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 77, 77, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
        }

        /* Social Dock */
        .social-dock {
            position: fixed;
            right: 2px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1000;
        }

        .dock-item {
            position: relative;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            perspective: 1000px;
        }

        .dock-item:hover {
            transform: translateX(-10px) rotateY(-20deg) scale(1.1);
            box-shadow: 10px 10px 20px rgba(0, 0, 0, 0.2);
        }

        .dock-name {
            position: absolute;
            right: 65px;
            background: #ff4d4d;
            color: white;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0;
            pointer-events: none;
            transform: translateX(20px);
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .dock-item:hover .dock-name {
            opacity: 1;
            transform: translateX(0);
        }

        .dock-item svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* Custom Sidebar Scrollbar */
        #dashboard-sidebar div::-webkit-scrollbar {
            width: 3px;
        }

        #dashboard-sidebar div::-webkit-scrollbar-thumb {
            background: #ff4d4d33;
            border-radius: 10px;
        }

        .reveal {
            opacity: 0;
            transform: translateY(40px);
        }
    </style>
</head>

<body class="bg-lightBg dark:bg-darkBg text-slate-900 dark:text-slate-100">

    <script src="script.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {

            function loadHTML(id, file) {
                fetch(file)
                    .then(response => {
                        if (!response.ok) {
                            throw new Error("File not found: " + file);
                        }
                        return response.text();
                    })
                    .then(data => {
                        document.getElementById(id).innerHTML = data;
                    })
                    .catch(error => console.error(error));
            }

            loadHTML("header", "header.html");
            loadHTML("sidebar", "sidebar.html");

        });
    </script>
